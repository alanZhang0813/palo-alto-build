<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Attendance - Green-Tech Inventory Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Record Customer Attendance</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="card p-4">
                    <div class="mb-3">
                        <label for="count" class="form-label">Number of Attendees</label>
                        <input type="number" class="form-control" id="count" name="count" min="0" required>
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label">Date (optional)</label>
                        <input type="date" class="form-control" id="date" name="date">
                        <div class="form-text">Leave empty for today</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-info">Record Attendance</button>
                        <a href="/" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="row justify-content-center mt-3">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Planning Tip</h5>
                        <p class="card-text">
                            Recording attendance helps the system predict future demand and avoid over-ordering.
                            The AI analyzes attendance patterns to forecast customer turnout for the next week.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
