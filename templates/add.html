<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item - Green-Tech Inventory Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Add New Item</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="card p-4">
                    <div class="mb-3">
                        <label for="name" class="form-label">Item Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Category (optional)</label>
                        <input type="text" class="form-control" id="category" name="category" placeholder="e.g. produce, lab supplies">
                        <div class="form-text">Leave blank to auto-categorize with AI/keywords.</div>
                    </div>

                    <div class="mb-3">
                        <label for="expires" class="form-label">Expiration Date (optional)</label>
                        <input type="date" class="form-control" id="expires" name="expires">
                        <div class="form-text">Leave empty if item doesn't expire</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Add Item</button>
                        <a href="/" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
