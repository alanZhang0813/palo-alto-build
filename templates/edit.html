<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item - Green-Tech Inventory Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Edit Item</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label for="name" class="form-label">Item Name</label>
                                <input type="text" class="form-control" id="name" value="{{ item.name }}" disabled>
                                <div class="form-text">Item names cannot be changed. Delete and recreate if needed.</div>
                            </div>

                            <div class="mb-3">
                                <label for="quantity" class="form-label">Quantity</label>
                                <input type="number" class="form-control" id="quantity" name="quantity" 
                                       value="{{ item.quantity }}" min="0" required>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Category</label>
                                <input type="text" class="form-control" id="category" name="category" 
                                       value="{{ item.category or '' }}">
                                <div class="form-text">Change or clear to let AI choose automatic label.</div>
                            </div>

                            <div class="mb-3">
                                <label for="expires" class="form-label">Expiration Date</label>
                                <input type="date" class="form-control" id="expires" name="expires"
                                       {% if item.expiration_date %}value="{{ item.expiration_date }}"{% endif %}>
                                <div class="form-text">Leave empty if item doesn't expire</div>
                            </div>

                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a href="/" class="btn btn-secondary">Cancel</a>
                            </div>

                            <!-- Danger Zone -->
                            <hr>
                            <div class="alert alert-danger">
                                <h6 class="alert-heading">⚠️ Danger Zone</h6>
                                <p class="small mb-2">Delete this item permanently from inventory.</p>
                                <form method="POST" action="/delete/{{ item.name }}" style="display: inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" 
                                            onclick="return confirm('Are you sure you want to delete {{ item.name }}? This cannot be undone.')">
                                        Delete Item
                                    </button>
                                </form>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
