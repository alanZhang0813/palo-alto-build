<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Consumption - Green-Tech Inventory Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Record Consumption</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="POST" class="card p-4">
                    <div class="mb-3">
                        <label for="name" class="form-label">Item Name</label>
                        <select class="form-select" id="name" name="name" required>
                            <option value="">Select an item...</option>
                            {% for item in items %}
                            <option value="{{ item.name }}">{{ item.name }} ({{ item.quantity }} available)</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity Consumed</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label">Date (optional)</label>
                        <input type="date" class="form-control" id="date" name="date">
                        <div class="form-text">Leave empty for today</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Record Consumption</button>
                        <a href="/" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

        {% if not items %}
        <div class="alert alert-warning mt-3">
            No items available. <a href="/add">Add items first</a>.
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
